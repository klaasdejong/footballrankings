name: Update FIFA Rankings

on:
  # Run every Tuesday at 06:00 UTC.
  # FIFA typically publishes updated rankings on Mon/Tue after match windows.
  schedule:
    - cron: '0 6 * * 2'

  # Allow manual trigger from the GitHub Actions UI at any time.
  workflow_dispatch:

permissions:
  contents: write   # needed to commit and push data/rankings.json

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest FIFA rankings
        # Script exits with code 1 on failure — step (and job) will fail
        # rather than silently overwriting good data with empty/broken data.
        run: node scripts/fetch-rankings.mjs

      - name: Fetch latest WC2026 program
        # Script exits with code 1 on failure — step (and job) will fail
        # rather than writing partial schedule data.
        run: node scripts/fetch-program.mjs

      - name: Validate WC2026 program data
        # Guard against partial/broken parser output before committing.
        run: node scripts/validate-program.mjs

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json
          git add data/program.json

          if git diff --staged --quiet; then
            echo "Data files are unchanged — nothing to commit."
          else
            git commit -m "chore: update WC data [skip ci]"
            git push
            echo "Data files updated and pushed."
          fi
